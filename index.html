<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tanish-btw · terminal</title>
<meta name="description" content="A Mumbai-based IT student turning curiosity into code.">
<meta property="og:title" content="tanish-btw · terminal portfolio">
<meta property="og:url" content="https://tanishbtw.me">
<link rel="canonical" href="https://tanishbtw.me">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

:root{
  --bg:      #0E1117;
  --surface: #161B24;
  --border:  #2A3142;
  --green:   #4EC994;
  --green-d: #2D7A57;
  --blue:    #7AA2F7;
  --yellow:  #E0AF68;
  --red:     #F7768E;
  --purple:  #BB9AF7;
  --cyan:    #7DCFFF;
  --gray:    #565F89;
  --text:    #C0CAF5;
  --text-dim:#4A5374;
  --mono:    'JetBrains Mono',monospace;
}

body{
  font-family:var(--mono);
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.6;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* ── TOP BAR ── */
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:10px 18px;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
.dots{display:flex;gap:7px}
.dot{width:13px;height:13px;border-radius:50%}
.dot-r{background:#F7768E}
.dot-y{background:#E0AF68}
.dot-g{background:#4EC994}
.tab-title{
  flex:1;text-align:center;
  font-size:12px;color:var(--gray);
  letter-spacing:.04em;
}

/* ── TERMINAL BODY ── */
.terminal{
  flex:1;
  overflow-y:auto;
  padding:20px 24px 8px;
  scroll-behavior:smooth;
}
.terminal::-webkit-scrollbar{width:4px}
.terminal::-webkit-scrollbar-track{background:transparent}
.terminal::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── OUTPUT LINES ── */
.line{
  display:block;
  white-space:pre-wrap;
  word-break:break-word;
  margin:0;
  line-height:1.65;
  animation:appear .08s ease both;
}
@keyframes appear{from{opacity:0}to{opacity:1}}

.line-blank{height:10px;display:block}
.line-cmd{color:var(--green)}
.line-err{color:var(--red)}
.line-info{color:var(--text)}
.line-dim{color:var(--gray)}
.line-head{color:var(--yellow);font-weight:500}
.line-key{color:var(--cyan)}
.line-val{color:var(--text)}
.line-acc{color:var(--green)}
.line-link{color:var(--blue);text-decoration:underline;cursor:pointer}
.line-link:hover{color:var(--cyan)}

/* ascii art */
.ascii{color:var(--green);line-height:1.3}

/* ── INPUT ROW ── */
.input-row{
  display:flex;align-items:center;
  padding:10px 24px 16px;
  flex-shrink:0;
  border-top:1px solid var(--border);
  gap:0;
}
.prompt-user{color:var(--green);font-weight:500}
.prompt-at{color:var(--gray)}
.prompt-host{color:var(--blue)}
.prompt-sep{color:var(--gray)}
.prompt-path{color:var(--yellow)}
.prompt-sign{color:var(--green);margin-right:8px}

#cmd-input{
  flex:1;
  background:transparent;border:none;outline:none;
  color:var(--text);
  font-family:var(--mono);font-size:14px;
  caret-color:var(--green);
}

/* mobile keyboard nudge */
@media(max-width:600px){
  body{font-size:13px}
  .terminal{padding:14px 14px 6px}
  .input-row{padding:8px 14px 12px}
  .tab-title{font-size:11px}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="dots">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
  </div>
  <div class="tab-title">tanish-btw@portfolio: ~</div>
</div>

<!-- OUTPUT -->
<div class="terminal" id="terminal"></div>

<!-- INPUT -->
<div class="input-row">
  <span class="prompt-user">tanish-btw</span><span class="prompt-at">@</span><span class="prompt-host">portfolio</span><span class="prompt-sep">:</span><span class="prompt-path">~</span><span class="prompt-sign"> $&nbsp;</span>
  <input id="cmd-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus placeholder="type 'help' to get started...">
</div>

<script>
// ── DATA ──────────────────────────────────────────────────
const DATA = {
  name:     'tanish-btw',
  full:     'Tanish Gamare',
  role:     'B.Sc. IT Student · Year 2',
  location: 'Mumbai, India',
  email:    'Tanish_20220@proton.me',
  domain:   'tanishbtw.me',

  about: [
    "Hey! I'm tanish-btw — a second-year B.Sc. IT student from Mumbai.",
    "I'm drawn to the intersection of web development and data.",
    "I learn best by breaking things, Googling furiously, fixing them,",
    "and repeating that loop until something actually works.",
    "",
    '"Learns by breaking things, asks too many questions,',
    ' and is slowly turning curiosity into code."',
  ],

  skills: {
    'Languages':  ['Python', 'JavaScript', 'HTML', 'CSS', 'SQL'],
    'Libraries':  ['Pandas', 'NumPy', 'Matplotlib', 'Flask'],
    'Tools':      ['Git', 'GitHub', 'VS Code', 'Linux basics'],
  },

  learning: [
    { name: 'ML / AI',         pct: 25, note: 'scikit-learn · basics'     },
    { name: 'REST APIs',       pct: 40, note: 'build + consume'            },
    { name: 'Data Structures', pct: 35, note: 'DSA for interviews'         },
    { name: 'React',           pct: 20, note: 'components · hooks'         },
    { name: 'Next.js',         pct: 15, note: 'App Router · TypeScript'    },
    { name: 'PostgreSQL',      pct: 20, note: 'queries · relations'        },
  ],

  projects: [
    { id: '01', name: 'Expense Tracker',    stack: 'Flask · SQLite · Chart.js',       status: 'idea'  },
    { id: '02', name: 'Marks Analyser',     stack: 'Python · Pandas · Matplotlib',    status: 'idea'  },
    { id: '03', name: 'Notice Aggregator',  stack: 'Python · BeautifulSoup · Email',  status: 'idea'  },
  ],

  socials: [
    { name: 'GitHub',    url: 'https://github.com/TanishGamare',            handle: 'TanishGamare'    },
    { name: 'LinkedIn',  url: 'https://www.linkedin.com/in/tanish-btw',     handle: 'tanish-btw'      },
    { name: 'Instagram', url: 'https://instagram.com/tanish_1212121',        handle: '@tanish_1212121' },
    { name: 'Email',     url: 'mailto:Tanish_20220@proton.me',              handle: 'Tanish_20220@proton.me' },
  ],

  education: [
    { period: '2022 – Present', title: 'B.Sc. Information Technology', place: 'University of Mumbai' },
    { period: '2020 – 2022',   title: 'HSC · Science Stream',           place: 'Mumbai, Maharashtra' },
  ],
}

// history
const history = []
let histIdx   = -1

// ── RENDER HELPERS ────────────────────────────────────────
const term = document.getElementById('terminal')

function line(text='', cls='line-info') {
  const s = document.createElement('span')
  s.className = 'line ' + cls
  s.textContent = text
  term.appendChild(s)
}
function blank() {
  const s = document.createElement('span')
  s.className = 'line-blank'
  term.appendChild(s)
}
function link(text, url) {
  const s = document.createElement('span')
  s.className = 'line line-link'
  s.textContent = text
  s.onclick = () => window.open(url, '_blank')
  term.appendChild(s)
}
function scroll() {
  term.scrollTop = term.scrollHeight
}

function bar(pct) {
  const filled = Math.round(pct / 5)
  const empty  = 20 - filled
  return '[' + '█'.repeat(filled) + '░'.repeat(empty) + '] ' + pct + '%'
}

// ── BOOT SEQUENCE ─────────────────────────────────────────
function boot() {
  line('  ████████╗ █████╗ ███╗  ██╗██╗███████╗██╗  ██╗', 'ascii')
  line('     ██╔══╝██╔══██╗████╗ ██║██║██╔════╝██║  ██║', 'ascii')
  line('     ██║   ███████║██╔██╗██║██║███████╗███████║', 'ascii')
  line('     ██║   ██╔══██║██║╚████║██║╚════██║██╔══██║', 'ascii')
  line('     ██║   ██║  ██║██║ ╚███║██║███████║██║  ██║', 'ascii')
  line('     ╚═╝   ╚═╝  ╚═╝╚═╝  ╚══╝╚═╝╚══════╝╚═╝  ╚═╝', 'ascii')
  blank()
  line('  ██████╗ ████████╗██╗    ██╗', 'ascii')
  line('  ██╔══██╗╚══██╔══╝██║    ██║', 'ascii')
  line('  ██████╔╝   ██║   ██║ █╗ ██║', 'ascii')
  line('  ██╔══██╗   ██║   ██║███╗██║', 'ascii')
  line('  ██████╔╝   ██║   ╚███╔███╔╝', 'ascii')
  line('  ╚═════╝    ╚═╝    ╚══╝╚══╝ ', 'ascii')
  blank()
  line('  ' + DATA.name + ' · ' + DATA.role, 'line-head')
  line('  ' + DATA.location + ' · ' + DATA.domain, 'line-dim')
  blank()
  line('  ┌─────────────────────────────────────────────┐', 'line-dim')
  line('  │  Type "help" to see available commands.     │', 'line-dim')
  line('  │  Press ↑ / ↓ to navigate history.           │', 'line-dim')
  line('  └─────────────────────────────────────────────┘', 'line-dim')
  blank()
  scroll()
}

// ── COMMANDS ──────────────────────────────────────────────
const COMMANDS = {

  help() {
    blank()
    line('  Available commands:', 'line-head')
    blank()
    const cmds = [
      ['whoami',    'who is tanish-btw?'],
      ['about',     'read my full bio'],
      ['skills',    'tech stack & tools'],
      ['learning',  'what I\'m currently learning'],
      ['projects',  'things I\'m building'],
      ['education', 'my academic background'],
      ['contact',   'get in touch'],
      ['socials',   'links to my profiles'],
      ['open',      'open a link  (e.g. open github)'],
      ['clear',     'clear the terminal'],
      ['help',      'show this message'],
    ]
    cmds.forEach(([cmd, desc]) => {
      const s = document.createElement('span')
      s.className = 'line'
      s.innerHTML = `  <span style="color:var(--cyan);min-width:120px;display:inline-block">${cmd}</span><span style="color:var(--gray)">— ${desc}</span>`
      term.appendChild(s)
    })
    blank()
    scroll()
  },

  whoami() {
    blank()
    line('  ' + DATA.name, 'line-acc')
    line('  ' + DATA.full,     'line-info')
    line('  ' + DATA.role,     'line-dim')
    line('  ' + DATA.location, 'line-dim')
    blank()
    scroll()
  },

  about() {
    blank()
    line('  ── about ──────────────────────────────────────', 'line-dim')
    blank()
    DATA.about.forEach(l => line('  ' + l, l.startsWith('"') || l.startsWith(' ') ? 'line-acc' : 'line-info'))
    blank()
    line('  status  →  open to internships 🟢', 'line-acc')
    blank()
    scroll()
  },

  skills() {
    blank()
    line('  ── skills & tools ─────────────────────────────', 'line-dim')
    blank()
    Object.entries(DATA.skills).forEach(([cat, items]) => {
      line('  ' + cat, 'line-head')
      line('  ' + items.map(i => '[ ' + i + ' ]').join('  '), 'line-key')
      blank()
    })
    scroll()
  },

  learning() {
    blank()
    line('  ── currently learning ─────────────────────────', 'line-dim')
    blank()
    DATA.learning.forEach(item => {
      const s = document.createElement('span')
      s.className = 'line'
      const nameCol = item.name.padEnd(20)
      s.innerHTML = `  <span style="color:var(--yellow)">${nameCol}</span><span style="color:var(--green)">${bar(item.pct)}</span>  <span style="color:var(--gray)">${item.note}</span>`
      term.appendChild(s)
    })
    blank()
    scroll()
  },

  projects() {
    blank()
    line('  ── projects ────────────────────────────────────', 'line-dim')
    blank()
    line('  ◌  No finished projects yet — ideas in motion:', 'line-dim')
    blank()
    DATA.projects.forEach(p => {
      line('  [' + p.id + '] ' + p.name, 'line-head')
      line('       stack  →  ' + p.stack, 'line-dim')
      line('       status →  ' + p.status, p.status === 'done' ? 'line-acc' : 'line-dim')
      blank()
    })
    line('  Tip: "open github" to see my repos', 'line-dim')
    blank()
    scroll()
  },

  education() {
    blank()
    line('  ── education ───────────────────────────────────', 'line-dim')
    blank()
    DATA.education.forEach(e => {
      line('  ' + e.period, 'line-yellow')
      line('  ' + e.title,  'line-head')
      line('  ' + e.place,  'line-dim')
      blank()
    })
    scroll()
  },

  contact() {
    blank()
    line('  ── contact ─────────────────────────────────────', 'line-dim')
    blank()
    line('  Open to internships, freelance work, and honest', 'line-info')
    line('  conversations about tech. Reply within a day.', 'line-info')
    blank()
    line('  email  →  ' + DATA.email, 'line-key')
    blank()
    line('  Type "socials" to see all my profiles.', 'line-dim')
    blank()
    scroll()
  },

  socials() {
    blank()
    line('  ── socials ─────────────────────────────────────', 'line-dim')
    blank()
    DATA.socials.forEach(s => {
      line('  ' + s.name.padEnd(12) + s.handle, 'line-key')
      const sp = document.createElement('span')
      sp.className = 'line line-link'
      sp.style.paddingLeft = '  14px'
      sp.textContent = '             ' + s.url
      sp.onclick = () => window.open(s.url, '_blank')
      term.appendChild(sp)
      blank()
    })
    line('  Tip: "open <name>" to open directly, e.g. "open github"', 'line-dim')
    blank()
    scroll()
  },

  open(args) {
    const target = (args[0] || '').toLowerCase()
    const map = {
      github:    DATA.socials.find(s => s.name === 'GitHub'),
      linkedin:  DATA.socials.find(s => s.name === 'LinkedIn'),
      instagram: DATA.socials.find(s => s.name === 'Instagram'),
      email:     DATA.socials.find(s => s.name === 'Email'),
      mail:      DATA.socials.find(s => s.name === 'Email'),
    }
    if (!target) {
      blank()
      line('  Usage: open <github|linkedin|instagram|email>', 'line-err')
      blank()
    } else if (map[target]) {
      blank()
      line('  Opening ' + map[target].name + '...', 'line-acc')
      blank()
      window.open(map[target].url, '_blank')
    } else {
      blank()
      line('  Unknown target: "' + target + '"', 'line-err')
      line('  Try: github, linkedin, instagram, email', 'line-dim')
      blank()
    }
    scroll()
  },

  clear() {
    term.innerHTML = ''
  },
}

// ── INPUT HANDLER ─────────────────────────────────────────
const input = document.getElementById('cmd-input')

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const raw   = input.value.trim()
    const parts = raw.split(/\s+/)
    const cmd   = parts[0].toLowerCase()
    const args  = parts.slice(1)

    // show prompt + command in output
    const promptLine = document.createElement('span')
    promptLine.className = 'line'
    promptLine.innerHTML = `<span style="color:var(--green)">tanish-btw</span><span style="color:var(--gray)">@</span><span style="color:var(--blue)">portfolio</span><span style="color:var(--gray)">:</span><span style="color:var(--yellow)">~</span><span style="color:var(--green)"> $ </span><span style="color:var(--text)">${raw}</span>`
    term.appendChild(promptLine)

    // push to history
    if (raw) { history.unshift(raw); histIdx = -1 }

    // run command
    if (!raw) {
      blank()
    } else if (COMMANDS[cmd]) {
      COMMANDS[cmd](args)
    } else {
      blank()
      line(`  command not found: ${cmd}`, 'line-err')
      line('  Type "help" to see available commands.', 'line-dim')
      blank()
    }

    input.value = ''
    scroll()
  }

  // history navigation
  if (e.key === 'ArrowUp') {
    e.preventDefault()
    if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx] }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault()
    if (histIdx > 0) { histIdx--; input.value = history[histIdx] }
    else { histIdx = -1; input.value = '' }
  }

  // tab autocomplete
  if (e.key === 'Tab') {
    e.preventDefault()
    const partial = input.value.toLowerCase()
    const match = Object.keys(COMMANDS).find(c => c.startsWith(partial))
    if (match) input.value = match
  }
})

// keep focus on input when clicking terminal
term.addEventListener('click', () => input.focus())
document.addEventListener('keydown', e => {
  if (e.target !== input && !e.metaKey && !e.ctrlKey) input.focus()
})

// ── BOOT ──────────────────────────────────────────────────
boot()
input.focus()
</script>
</body>
</html>
